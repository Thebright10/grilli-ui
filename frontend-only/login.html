
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Grilli - Login & SignUp</title>
  <meta name="title" content="Grilli - Login & SignUp">
  <meta name="description" content="This is a Restaurant html template made by Our Team">

  <!-- favicon -->
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">

  <!-- boxicons font link -->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

  <!-- custom css link -->
  <link rel="stylesheet" href="./assets/logincss/style.css">

  <!-- google font link -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Forum&display=swap" rel="stylesheet">
  
  <style>
      .html-message {
          position: absolute;
          top: 80px;
          left: 50%;
          transform: translateX(-50%);
          z-index: 100;
          font-family: 'DM Sans', sans-serif;
          font-weight: bold;
          text-align: center;
          padding: 10px 20px;
          border-radius: 5px;
          background-color: rgba(0, 0, 0, 0.7);
      }
      .error { color: #ff4d4d; border: 1px solid #ff4d4d; }
      .success { color: #00cc66; border: 1px solid #00cc66; }
  </style>

</head>

<body>

  <!-- #PRELOADER -->
  <div class="preload" data-preaload>
    <div class="circle"></div>
    <p class="text">Grilli</p>
  </div>

   <!-- #HEADER -->
  <header class="header"> 
    <div class="container">
      <a href="index.html" class="logo">
        <img src="./images/logo.svg" width="300" height="70" alt="Grilli Home">
      </a>
    </div>
  </header>

  
      <div class="jsp-message error"></div>
  
  
      <div class="jsp-message success"></div>
  

   <!-- #LOGIN FORM -->
    <div class="wrapper">
        <span class="bg-animate"></span>
        <span class="bg-animate2"></span>

        <div class="form-box login">
          <h2 class="animation" style="--i:0; --j:21">Login</h2>
          <form action="LoginController" method="POST">
            <div class="input-box animation" style="--i:1; --j:22">
              <input type="text" name="email" required>
              <label>Email</label>
              <i class='bx bxs-user'></i>
            </div>
            <div class="input-box animation" style="--i:2; --j:23">
              <input type="password" name="password" required>
              <label>Password</label>
              <i class='bx bxs-lock-alt'></i>
            </div> 
            <button type="submit" class="btn animation" style="--i:3; --j:24">Login</button>
            <div class="logreg-link animation" style="--i:4; --j:25">
              <p>Don't have an account? <a href="#" class="register-link">Sign Up</a></p>
            </div> 
          </form>
        </div>
        <div class="info-text login">
          <h2 class="animation" style="--i:0; --j:20">Welcome Back!</h2>
          <p class="animation" style="--i:1; --j:21">We Serve the best ART!! Food that makes you say wow. </p>
        </div>

        <div class="form-box register">
          <h2 class="animation" style="--i:17; --j:0">Sign Up</h2>
          <form action="SignupController" method="POST">
            <div class="input-box animation" style="--i:18; --j:1">
              <input type="text" name="username" required>
              <label>Username</label>
              <i class='bx bxs-user'></i>
            </div>
            <div class="input-box animation" style="--i:19; --j:2">
              <input type="email" name="email" required>
              <label>Email</label>
              <i class='bx bxs-envelope'></i>
            </div>
            <div class="input-box animation" style="--i:20; --j:3">
              <input type="password" name="password" required>
              <label>Password</label>
              <i class='bx bxs-lock-alt'></i>
            </div> 
            <button type="submit" class="btn animation" style="--i:21; --j:4">Sign Up</button>
            <div class="logreg-link animation" style="--i:22; --j:5">
              <p>Already have an account? <a href="#" class="login-link">Login</a></p>
            </div> 
          </form>
        </div>
        <div class="info-text register">
          <h2 class="animation" style="--i:17; --j:0">Here we Go!</h2>
          <p class="animation" style="--i:18; --j:1">A Dining Experience Unlike Any Other!!!</p>
        </div>
      </div>

 <!-- #CUSTOM JS LINK -->
    <script src="./assets/loginjs/script.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const forms = document.querySelectorAll("form");
    forms.forEach(f => {
        f.addEventListener("submit", function(e) {
            e.preventDefault();
            localStorage.setItem("loggedIn", "true");
            window.location.href = "index.html";
        });
    });
});
</script>
</body>

</html>
